services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        DIRECT_URL: ${DIRECT_URL}
        NODE_ENV: ${NODE_ENV:-production}
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      HOSTNAME: ${HOSTNAME:-0.0.0.0}
    expose:
      - "${PORT:-3001}"
    restart: unless-stopped
    networks:
      - shared_proxy
